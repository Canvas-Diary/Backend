key:
  openai:
    api-key: ${DALLE_REST_API_KEY}
  gemini:
    api-key: ${GEMINI_REST_API_KEY}

cloud:
  aws:
    s3:
      bucket: ${S3_BUCKET_NAME}
    stack:
      auto: false
    region:
      static: ap-northeast-2
    credentials:
      access-key: ${S3_ACCESS_KEY}
      secret-key: ${S3_SECRET_KEY}